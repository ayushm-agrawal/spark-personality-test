# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Python app to Azure Web App - personality-test-backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/main_personality-test-backend.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create and start virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate

      - name: Install dependencies
        run: pip install -r backend/app/requirements.txt

      - name: Zip artifact for deployment
        working-directory: backend/app
        run: zip -r ../../release.zip .

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact for deployment
        run: |
          mkdir -p deploy
          unzip release.zip -d deploy

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CB20F66F438C49098FB735D88B426972 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A087A37435FC457AA030C96317FD0352 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_57BA4474A4BE401B96F967005DE71215 }}

      - name: Configure Azure Web App startup command
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config set --resource-group personality-test-rg --name personality-test-backend --startup-file "gunicorn --bind=0.0.0.0:8000 --workers=4 --timeout=120 -k uvicorn.workers.UvicornWorker main:app"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'personality-test-backend'
          slot-name: 'Production'
          package: deploy
